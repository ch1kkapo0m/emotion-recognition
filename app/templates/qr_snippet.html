<!-- ── QR блок (вставити одразу після </header> в index.html) ── -->
<div id="qrBanner" style="
    background:#18181f;
    border-bottom:1px solid #2a2a35;
    padding:10px 24px;
    display:flex;
    align-items:center;
    gap:16px;
    cursor:pointer;
" onclick="document.getElementById('qrModal').style.display='flex'" title="Відкрити на телефоні">
    <img src="/qr" style="width:52px;height:52px;border-radius:6px;background:#fff;padding:3px;">
    <div>
        <div style="font-size:13px;font-weight:600;">📱 Відкрити на телефоні</div>
        <div id="qrUrlText" style="font-size:11px;color:#6b6b80;"></div>
    </div>
</div>

<!-- ── Модальне вікно з великим QR ── -->
<div id="qrModal" style="
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,0.75);
    z-index:1000;
    justify-content:center;
    align-items:center;
" onclick="this.style.display='none'">
    <div style="
        background:#18181f;
        border-radius:20px;
        padding:32px;
        text-align:center;
        box-shadow:0 20px 60px rgba(0,0,0,0.5);
    " onclick="event.stopPropagation()">
        <div style="font-size:18px;font-weight:700;margin-bottom:16px;">📱 Відскануй QR-код</div>
        <img src="/qr" style="width:220px;height:220px;border-radius:12px;background:#fff;padding:8px;">
        <div id="qrModalUrl" style="margin-top:12px;font-size:12px;color:#6b6b80;"></div>
        <button onclick="document.getElementById('qrModal').style.display='none'" style="
            margin-top:16px;
            background:#2a2a35;
            border:none;
            color:#e2e2e8;
            padding:10px 24px;
            border-radius:10px;
            font-size:14px;
            cursor:pointer;
        ">Закрити</button>
    </div>
</div>

<script>
// підтягує URL і показує його під QR
fetch('/qr_url').then(r=>r.json()).then(d=>{
    document.getElementById('qrUrlText').textContent = d.url;
    document.getElementById('qrModalUrl').textContent = d.url;
});
</script>
